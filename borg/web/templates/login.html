<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borg Login</title>
    <style>
        :root { --bg: #0b0d11; --panel: #151821; --text: #e2e4e9; --muted: #8b92a8; --accent: #4cc38a; --danger: #eb5757; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-box { background: var(--panel); border: 1px solid #272a30; border-radius: 16px; padding: 2rem; width: 340px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        h1 { margin: 0 0 1.5rem; font-size: 1.4rem; text-align: center; }
        input { width: 100%; background: #0f1115; border: 1px solid #272a30; color: var(--text); padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; font-size: 1rem; }
        button { width: 100%; background: var(--accent); color: #000; border: none; padding: 0.75rem; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 1rem; }
        button:hover { opacity: 0.9; }
        .error { color: var(--danger); text-align: center; margin-top: 0.75rem; font-size: 0.9rem; }
        .hint { color: var(--muted); font-size: 0.8rem; text-align: center; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🧠 Borg</h1>
        <form method="post" action="/login">
            <input type="password" name="password" placeholder="Enter password" autofocus required>
            <button type="submit">Enter</button>
            {% if error %}<div class="error">{{ error }}</div>{% endif %}
        </form>
        <div class="hint">Set BORG_PASSWORD env var or .env to enable auth.</div>
    </div>
</body>
</html>

{% extends "base.html" %}
{% block title %}Report Marketplace · Borg{% endblock %}
{% block content %}
<div class="breadcrumb">Reports / Marketplace</div>
<h2 style="margin-top:0">Report Marketplace</h2>
<p class="muted">Free daily reports generated by Borg. Click a card to view or download.</p>

<div class="actions">
    <a class="btn" href="/reports/schedule">Schedule</a>
    <button onclick="generateReports()">Generate Today's Reports</button>
    <a class="btn" href="/api/reports" target="_blank">Raw JSON</a>
</div>

<div class="panel">
    <h2>All Listings</h2>
    <div id="marketplaceGrid" class="marketplace-grid"></div>
</div>

<script>
async function loadMarketplace() {
    const res = await fetch('/api/reports');
    const reports = await res.json();
    const grid = document.getElementById('marketplaceGrid');
    grid.innerHTML = reports.map(r => {
        const categoryClass = r.category;
        return `
            <div class="marketplace-card">
                <div class="card-header ${categoryClass}">
                    <span class="card-category">${r.category.toUpperCase()}</span>
                    <span class="card-date">${r.report_date}</span>
                </div>
                <h3>${r.title}</h3>
                <p class="muted">${r.description}</p>
                <div class="card-actions">
                    <a class="btn btn-primary" href="/reports/view/${r.slug}">View Report</a>
                    <a class="btn" href="/api/reports/${r.slug}/pdf" target="_blank">Download PDF</a>
                </div>
            </div>
        `;
    }).join('');
}

async function generateReports() {
    const btn = event.target;
    btn.disabled = true;
    btn.textContent = 'Generating...';
    try {
        const res = await fetch('/api/reports/generate', {method: 'POST'});
        const data = await res.json();
        alert(`Generated ${data.generated.length} reports`);
        loadMarketplace();
    } catch (e) {
        alert('Error: ' + e);
    } finally {
        btn.disabled = false;
        btn.textContent = "Generate Today's Reports";
    }
}

loadMarketplace();
</script>

<style>
.marketplace-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.25rem; }
.marketplace-card { background: #0f1115; border: 1px solid #272a30; border-radius: 12px; padding: 1.25rem; display: flex; flex-direction: column; }
.marketplace-card h3 { margin: 0.75rem 0; font-size: 1.1rem; }
.marketplace-card .muted { flex: 1; }
.card-header { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0.75rem; margin: -1.25rem -1.25rem 0.75rem -1.25rem; border-radius: 12px 12px 0 0; border-bottom: 1px solid #272a30; }
.card-category { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.05em; }
.card-date { font-size: 0.8rem; color: var(--muted); }
.card-header.daily { background: rgba(76, 195, 138, 0.1); }
.card-header.hr { background: rgba(242, 201, 76, 0.1); }
.card-header.brent { background: rgba(122, 162, 247, 0.1); }
.card-header.coffee { background: rgba(235, 87, 87, 0.1); }
.card-actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
</style>
{% endblock %}

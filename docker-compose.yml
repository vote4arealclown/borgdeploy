version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: borg
      POSTGRES_PASSWORD: borg
      POSTGRES_DB: borg
    volumes:
      - borg_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U borg"]
      interval: 5s
      timeout: 5s
      retries: 20

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    mem_limit: 2g
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  borg:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://borg:borg@db:5432/borg
      LLM_BASE_URL: http://ollama:11434
      BORG_PASSWORD: ${BORG_PASSWORD:-borg}
    ports:
      - "0.0.0.0:8000:8000"
    mem_limit: 512m
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "0.0.0.0:9090:9090"
    volumes:
      - ./monitoring/prometheus-docker.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-lifecycle'
    mem_limit: 256m

  grafana:
    image: grafana/grafana:latest
    ports:
      - "0.0.0.0:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    mem_limit: 256m
    depends_on:
      - prometheus

volumes:
  borg_pgdata:
  ollama_data:
  grafana-storage:
